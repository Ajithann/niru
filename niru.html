<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    min-height:100vh;
    overflow:hidden;
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:50px;
    max-width:800px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:5rem;
    margin-bottom:20px;
}

.message{
    font-size:1.3rem;
    line-height:1.8;
}

.heart{
    font-size:4rem;
    animation:beat 1.2s infinite;
    margin:20px 0;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}

.floating-heart{
    position:absolute;
    color:white;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4d6d;
    font-size:1rem;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Hey Niru❤️</h1>

        <div class="heart">💖</div>

        <p class="message">
            Every moment with you feels like a beautiful dream.<br><br>

            You are my happiness, my peace, my favorite person,
            and the most beautiful chapter of my life.<br><br>

            No matter where life takes us,
            my heart will always choose you.
        </p>

        <button onclick="showMessage()">
            Click Me ❤️
        </button>
    </div>
</div>

<script>
function showMessage(){
    alert("I love you more than words can ever describe ❤️");
}

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("floating-heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
